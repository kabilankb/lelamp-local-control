<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeLamp Control Panel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2a4a;
        }

        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected { background: #e74c3c; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 80px);
        }

        .panel {
            background: #12121f;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 14px 18px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8888aa;
        }

        /* Chat Panel */
        .chat-panel {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e1e35;
            border: 1px solid #2a2a4a;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            color: #666;
            font-size: 12px;
            font-style: italic;
        }

        .message .tool-info {
            font-size: 11px;
            color: #9b59b6;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #2a2a4a;
        }

        .chat-input-area {
            padding: 16px;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus { border-color: #2563eb; }
        .chat-input-area input::placeholder { color: #555; }

        .chat-input-area button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input-area button:hover { background: #1d4ed8; }
        .chat-input-area button:disabled { background: #333; cursor: not-allowed; }

        /* TTS Toggle */
        .tts-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            font-size: 12px;
            color: #888;
        }

        .tts-toggle label { cursor: pointer; }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            -webkit-appearance: none;
            background: #2a2a4a;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch:checked { background: #2ecc71; }

        .toggle-switch::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            transition: transform 0.3s;
        }

        .toggle-switch:checked::before { transform: translateX(16px); }

        /* Voice status bar */
        .voice-status {
            padding: 6px 16px;
            font-size: 11px;
            color: #666;
            border-top: 1px solid #1a1a2e;
            display: none;
        }

        .voice-status.visible { display: block; }
        .voice-status.listening { color: #3498db; }
        .voice-status.speaking { color: #2ecc71; }

        /* Right Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        /* LED Visualization */
        .led-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            padding: 16px;
        }

        .led-pixel {
            aspect-ratio: 1;
            border-radius: 50%;
            background: #111;
            border: 1px solid #222;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .led-pixel.on {
            box-shadow: 0 0 8px currentColor;
        }

        /* Color Picker */
        .color-controls {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .color-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .color-row label {
            width: 14px;
            font-weight: bold;
            font-size: 14px;
        }

        .color-row input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #2a2a4a;
            border-radius: 3px;
            outline: none;
        }

        .color-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
        }

        .color-row.red input::-webkit-slider-thumb { background: #e74c3c; }
        .color-row.green input::-webkit-slider-thumb { background: #2ecc71; }
        .color-row.blue input::-webkit-slider-thumb { background: #3498db; }

        .color-row .val {
            width: 36px;
            text-align: right;
            font-size: 12px;
            color: #888;
        }

        .color-preview {
            height: 40px;
            border-radius: 8px;
            border: 1px solid #2a2a4a;
            transition: background 0.2s;
        }

        .btn {
            padding: 10px 16px;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .btn:hover { background: #252540; border-color: #3a3a5a; }
        .btn:active { transform: scale(0.97); }

        /* Movement Buttons */
        .movement-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            padding: 16px;
        }

        .move-btn {
            padding: 10px;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .move-btn:hover { background: #252540; border-color: #9b59b6; color: #fff; }
        .move-btn:active { transform: scale(0.95); }
        .move-btn.playing { border-color: #2ecc71; color: #2ecc71; }

        /* Make the last button (Wake Up) span full width when odd count */
        .movement-grid .move-btn:last-child:nth-child(odd) {
            grid-column: 1 / -1;
        }

        /* Thinking indicator */
        .thinking {
            display: none;
            align-self: flex-start;
            padding: 10px 14px;
            background: #1e1e35;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            font-size: 14px;
            color: #888;
        }

        .thinking.visible { display: block; }

        .thinking span {
            animation: blink 1.4s infinite;
        }

        .thinking span:nth-child(2) { animation-delay: 0.2s; }
        .thinking span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            .chat-panel { min-height: 60vh; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>LeLamp Control Panel</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connected</span>
        </div>
    </div>

    <div class="container">
        <!-- Chat Panel -->
        <div class="panel chat-panel">
            <div class="panel-header">Chat</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message system">LeLamp is ready. Say something!</div>
            </div>
            <div class="thinking" id="thinking">
                <span>.</span><span>.</span><span>.</span> LeLamp is thinking
            </div>
            <div class="voice-status" id="voiceStatus"></div>
            <div class="tts-toggle">
                <input type="checkbox" class="toggle-switch" id="ttsToggle" checked>
                <label for="ttsToggle">TTS (read aloud)</label>
                <span style="margin-left:auto">
                    <select id="ttsMode" style="background:#1a1a2e;color:#888;border:1px solid #2a2a4a;border-radius:4px;padding:2px 6px;font-size:11px;">
                        <option value="browser">Browser TTS</option>
                        <option value="server">Edge TTS (better)</option>
                    </select>
                </span>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Type or just speak..." autocomplete="off">
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Right Sidebar -->
        <div class="sidebar">
            <!-- LED Visualization -->
            <div class="panel">
                <div class="panel-header">LED Display (8x5)</div>
                <div class="led-grid" id="ledGrid"></div>
            </div>

            <!-- Color Control -->
            <div class="panel">
                <div class="panel-header">Color Control</div>
                <div class="color-controls">
                    <div class="color-row red">
                        <label style="color:#e74c3c">R</label>
                        <input type="range" min="0" max="255" value="255" id="redSlider" oninput="updateColor()">
                        <span class="val" id="redVal">255</span>
                    </div>
                    <div class="color-row green">
                        <label style="color:#2ecc71">G</label>
                        <input type="range" min="0" max="255" value="255" id="greenSlider" oninput="updateColor()">
                        <span class="val" id="greenVal">255</span>
                    </div>
                    <div class="color-row blue">
                        <label style="color:#3498db">B</label>
                        <input type="range" min="0" max="255" value="0" id="blueSlider" oninput="updateColor()">
                        <span class="val" id="blueVal">0</span>
                    </div>
                    <div class="color-preview" id="colorPreview" style="background:rgb(255,255,0)"></div>
                    <button class="btn" onclick="applyColor()">Apply Color</button>
                </div>
            </div>

            <!-- Movement Controls -->
            <div class="panel">
                <div class="panel-header">Movements (11)</div>
                <div class="movement-grid" id="movementGrid">
                    <button class="move-btn" onclick="playMove('curious')">&#128064; Curious</button>
                    <button class="move-btn" onclick="playMove('excited')">&#127881; Excited</button>
                    <button class="move-btn" onclick="playMove('happy_wiggle')">&#128522; Happy Wiggle</button>
                    <button class="move-btn" onclick="playMove('headshake')">&#128528; Head Shake</button>
                    <button class="move-btn" onclick="playMove('idle')">&#128564; Idle</button>
                    <button class="move-btn" onclick="playMove('nod')">&#128077; Nod</button>
                    <button class="move-btn" onclick="playMove('sad')">&#128546; Sad</button>
                    <button class="move-btn" onclick="playMove('scanning')">&#128269; Scanning</button>
                    <button class="move-btn" onclick="playMove('shock')">&#9889; Shock</button>
                    <button class="move-btn" onclick="playMove('shy')">&#128563; Shy</button>
                    <button class="move-btn" onclick="playMove('wake_up')">&#9728;&#65039; Wake Up</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const thinking = document.getElementById('thinking');
        const ledGrid = document.getElementById('ledGrid');

        // Init LED grid (8x5 = 40 pixels)
        for (let i = 0; i < 40; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'led-pixel';
            pixel.id = `led-${i}`;
            ledGrid.appendChild(pixel);
        }

        // Socket events
        socket.on('connect', () => {
            document.getElementById('statusDot').classList.remove('disconnected');
            document.getElementById('statusText').textContent = 'Connected';
        });

        socket.on('disconnect', () => {
            document.getElementById('statusDot').classList.add('disconnected');
            document.getElementById('statusText').textContent = 'Disconnected';
        });

        socket.on('chat_response', (data) => {
            thinking.classList.remove('visible');
            sendBtn.disabled = false;
            chatInput.disabled = false;
            isProcessing = false;

            const msg = document.createElement('div');
            msg.className = 'message assistant';
            msg.innerHTML = data.text;
            if (data.tools && data.tools.length > 0) {
                const toolInfo = document.createElement('div');
                toolInfo.className = 'tool-info';
                toolInfo.textContent = data.tools.join(' | ');
                msg.appendChild(toolInfo);
            }
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // TTS — speak the response (ASR resumes after TTS finishes)
            if (document.getElementById('ttsToggle').checked && data.text) {
                speakText(data.text);
            } else {
                // No TTS — resume listening immediately
                resumeASR();
            }
        });

        socket.on('led_update', (data) => {
            if (data.type === 'solid') {
                const [r, g, b] = data.color;
                for (let i = 0; i < 40; i++) {
                    const pixel = document.getElementById(`led-${i}`);
                    pixel.style.background = `rgb(${r},${g},${b})`;
                    pixel.style.color = `rgb(${r},${g},${b})`;
                    pixel.classList.toggle('on', r + g + b > 0);
                }
            } else if (data.type === 'paint') {
                data.colors.forEach((c, i) => {
                    if (i < 40) {
                        const pixel = document.getElementById(`led-${i}`);
                        pixel.style.background = `rgb(${c[0]},${c[1]},${c[2]})`;
                        pixel.style.color = `rgb(${c[0]},${c[1]},${c[2]})`;
                        pixel.classList.toggle('on', c[0] + c[1] + c[2] > 0);
                    }
                });
            }
        });

        socket.on('move_done', () => {
            document.querySelectorAll('.move-btn.playing').forEach(b => b.classList.remove('playing'));
        });

        // Send message
        function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;

            const msg = document.createElement('div');
            msg.className = 'message user';
            msg.textContent = text;
            chatMessages.appendChild(msg);

            thinking.classList.add('visible');
            sendBtn.disabled = true;
            chatInput.disabled = true;
            isProcessing = true;
            pauseASR();

            socket.emit('chat_message', { text });
            chatInput.value = '';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
        });

        // Color control
        function updateColor() {
            const r = document.getElementById('redSlider').value;
            const g = document.getElementById('greenSlider').value;
            const b = document.getElementById('blueSlider').value;
            document.getElementById('redVal').textContent = r;
            document.getElementById('greenVal').textContent = g;
            document.getElementById('blueVal').textContent = b;
            document.getElementById('colorPreview').style.background = `rgb(${r},${g},${b})`;
        }

        function applyColor() {
            const r = parseInt(document.getElementById('redSlider').value);
            const g = parseInt(document.getElementById('greenSlider').value);
            const b = parseInt(document.getElementById('blueSlider').value);
            socket.emit('set_color', { red: r, green: g, blue: b });
        }

        // Movement control
        function playMove(name) {
            const btn = event.target;
            btn.classList.add('playing');
            socket.emit('play_move', { name });
            setTimeout(() => btn.classList.remove('playing'), 3000);
        }

        // ===== ASR — Always-on Voice Activity Detection =====
        const voiceStatus = document.getElementById('voiceStatus');
        const hasBrowserASR = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
        let recognition = null;
        let isSpeaking = false;       // TTS is currently playing
        let isProcessing = false;     // Waiting for LLM response
        let asrEnabled = true;

        function setVoiceStatus(text, cls) {
            voiceStatus.textContent = text;
            voiceStatus.className = 'voice-status visible ' + (cls || '');
            if (!text) voiceStatus.className = 'voice-status';
        }

        function startAlwaysOnASR() {
            if (!hasBrowserASR) {
                setVoiceStatus('Browser ASR not supported — use Chrome or Edge for voice', '');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;

            let finalTranscript = '';
            let silenceTimer = null;

            recognition.onstart = () => {
                setVoiceStatus('Listening...', 'listening');
            };

            recognition.onresult = (event) => {
                // Don't process if TTS is speaking or waiting for response
                if (isSpeaking || isProcessing) return;

                let interim = '';
                finalTranscript = '';

                for (let i = 0; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }

                // Show interim text in input
                if (interim) {
                    chatInput.value = interim;
                    setVoiceStatus('Hearing: ' + interim, 'listening');
                }

                // When we get final text, wait a short pause then send
                if (finalTranscript.trim()) {
                    chatInput.value = finalTranscript.trim();
                    clearTimeout(silenceTimer);
                    silenceTimer = setTimeout(() => {
                        if (chatInput.value.trim() && !isProcessing && !isSpeaking) {
                            setVoiceStatus('Sending...', '');
                            sendMessage();
                            finalTranscript = '';
                        }
                    }, 800); // 800ms silence = send
                }
            };

            recognition.onerror = (event) => {
                if (event.error === 'no-speech') {
                    // Normal — just no one is talking, restart
                    return;
                }
                if (event.error === 'aborted') return;
                console.error('ASR error:', event.error);
                setVoiceStatus('Voice error: ' + event.error, '');
            };

            recognition.onend = () => {
                // Auto-restart unless disabled
                if (asrEnabled && !isSpeaking) {
                    setTimeout(() => {
                        if (asrEnabled) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                } else {
                    setVoiceStatus('Paused (waiting for response)', '');
                }
            };

            recognition.start();
        }

        function pauseASR() {
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
        }

        function resumeASR() {
            if (asrEnabled && recognition) {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                    setVoiceStatus('Listening...', 'listening');
                }, 500);
            }
        }

        // Server ASR fallback
        socket.on('transcription', (data) => {
            setVoiceStatus('');
            if (data.text) {
                chatInput.value = data.text;
                sendMessage();
            }
        });

        socket.on('transcribe_status', (data) => {
            setVoiceStatus(data.status, 'listening');
        });

        // Start always-on listening when page loads
        startAlwaysOnASR();

        // ===== TTS (Text-to-Speech) =====
        function speakText(text) {
            const mode = document.getElementById('ttsMode').value;

            if (mode === 'browser') {
                speakBrowser(text);
            } else {
                speakServer(text);
            }
        }

        function speakBrowser(text) {
            if (!('speechSynthesis' in window)) {
                speakServer(text);
                return;
            }

            window.speechSynthesis.cancel();
            isSpeaking = true;
            pauseASR();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 1.05;
            utterance.pitch = 1.1;

            utterance.onstart = () => setVoiceStatus('Speaking...', 'speaking');
            utterance.onend = () => {
                isSpeaking = false;
                setVoiceStatus('');
                resumeASR();
            };
            utterance.onerror = () => {
                isSpeaking = false;
                setVoiceStatus('');
                resumeASR();
            };

            window.speechSynthesis.speak(utterance);
        }

        function speakServer(text) {
            isSpeaking = true;
            pauseASR();
            setVoiceStatus('Generating speech...', 'speaking');
            socket.emit('request_tts', { text });
        }

        // Server TTS response — plays mp3 audio
        socket.on('tts_audio', (data) => {
            if (data.error) {
                isSpeaking = false;
                setVoiceStatus('TTS error: ' + data.error);
                resumeASR();
                return;
            }

            setVoiceStatus('Speaking...', 'speaking');
            const audioData = atob(data.audio);
            const arrayBuffer = new ArrayBuffer(audioData.length);
            const view = new Uint8Array(arrayBuffer);
            for (let i = 0; i < audioData.length; i++) {
                view[i] = audioData.charCodeAt(i);
            }

            const blob = new Blob([arrayBuffer], { type: 'audio/mpeg' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);

            audio.onended = () => {
                isSpeaking = false;
                setVoiceStatus('');
                URL.revokeObjectURL(url);
                resumeASR();
            };
            audio.onerror = () => {
                isSpeaking = false;
                setVoiceStatus('');
                URL.revokeObjectURL(url);
                resumeASR();
            };

            audio.play().catch(err => {
                console.error('Audio playback error:', err);
                isSpeaking = false;
                setVoiceStatus('');
                resumeASR();
            });
        });

        // Focus input on load
        chatInput.focus();
    </script>
</body>
</html>
